name: IIS-CI-CD

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Application
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test --no-build --verbosity normal

      - name: Publish Application
        run: dotnet publish DemoApi/DemoApi.csproj -c Release -o publish

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish

  deploy:
    needs: build
    runs-on: [self-hosted, windows]

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: publish

      - name: Install sshpass via choco
        shell: powershell
        run: |
          choco install sshpass -y

      - name: Copy files to IIS VM
        shell: powershell
        run: |
          sshpass -p "${{ secrets.VM_PASSWORD }}" `
            scp -r publish/* `
            ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:/c:/inetpub/DemoApi/

      - name: Restart IIS App Pool
        shell: powershell
        run: |
          sshpass -p "${{ secrets.VM_PASSWORD }}" `
            ssh -o StrictHostKeyChecking=no `
            ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} `
            "powershell -Command `"Import-Module WebAdministration; Restart-WebAppPool -Name 'DemoApiPool'`""