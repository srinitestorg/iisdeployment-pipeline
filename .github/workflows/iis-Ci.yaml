name: IIS-CI-CD

on:
  workflow_dispatch:

jobs:

  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Application
        run: dotnet build --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test --no-build --verbosity normal

      - name: Publish Application
        run: dotnet publish DemoApi/DemoApi.csproj -c Release -o publish

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: publish

  deploy:
    needs: build
    runs-on: [self-hosted, windows]

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: publish

      - name: Verify Published Files
        shell: powershell
        run: |
          Write-Host "Published files:"
          Get-ChildItem publish -Recurse

      - name: Deploy to IIS using MSDeploy
        shell: powershell
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          & $msdeploy `
            -verb:sync `
            -source:contentPath="publish" `
            -dest:contentPath="DemoApi",computerName="https://${{ secrets.IIS_SERVER }}:8172/msdeploy.axd?site=DemoApi",userName="${{ secrets.IIS_USERNAME }}",password="${{ secrets.IIS_PASSWORD }}",authType="Basic" `
            -allowUntrusted

      - name: Restart IIS App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Restart-WebAppPool -Name "DemoApiPool"